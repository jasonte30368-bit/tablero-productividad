<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero de Productividad</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg-primary:#ffffff;--bg-secondary:#f5f5f3;--bg-tertiary:#efefed;
    --text-primary:#1a1a18;--text-secondary:#6b6b68;--text-tertiary:#9b9b97;
    --border-light:rgba(0,0,0,0.12);--border-mid:rgba(0,0,0,0.22);
    --radius-md:8px;--radius-lg:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg-primary:#1e1e1c;--bg-secondary:#2a2a28;--bg-tertiary:#323230;
    --text-primary:#f0f0ee;--text-secondary:#a0a09c;--text-tertiary:#6e6e6a;
    --border-light:rgba(255,255,255,0.10);--border-mid:rgba(255,255,255,0.18);}
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg-tertiary);color:var(--text-primary);min-height:100vh;}
  .container{max-width:960px;margin:0 auto;padding:1.5rem 1rem 3rem;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;}
  .ttl{font-size:18px;font-weight:500;color:var(--text-primary);}
  .rol-badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:var(--radius-md);font-weight:500;}
  .rol-badge.admin{background:#EAF3DE;color:#3B6D11;}
  .rol-badge.viewer{background:#E6F1FB;color:#185FA5;}
  .btn{font-size:12px;padding:5px 14px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);cursor:pointer;}
  .btn:hover{background:var(--bg-secondary);}
  .btn.prim{background:#639922;color:#fff;border-color:#3B6D11;}
  .btn.prim:hover{background:#3B6D11;}
  .btn.danger{background:#FCEBEB;color:#A32D2D;border-color:#E24B4A;}
  .btn.danger:hover{background:#F7C1C1;}
  .sync-bar{font-size:11px;padding:5px 12px;border-radius:var(--radius-md);margin-bottom:10px;display:none;}
  .sync-bar.ok{display:block;background:#EAF3DE;color:#3B6D11;}
  .sync-bar.err{display:block;background:#FCEBEB;color:#A32D2D;}
  .sync-bar.loading{display:block;background:#E6F1FB;color:#185FA5;}
  .sec{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;}
  .sec-t{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:10px;}
  .proj-tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:0.5px solid var(--border-light);overflow-x:auto;}
  .proj-tab{font-size:13px;padding:7px 16px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;}
  .proj-tab:hover{color:var(--text-primary);}
  .proj-tab.activo{color:#3B6D11;border-bottom-color:#639922;font-weight:500;}
  .nav-tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
  .nav-tab{font-size:12px;padding:4px 12px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;}
  .nav-tab.activo{background:var(--bg-secondary);color:var(--text-primary);font-weight:500;}
  .metricas{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem;}
  .mc{background:var(--bg-secondary);border-radius:var(--radius-md);padding:9px 11px;}
  .mc-l{font-size:11px;color:var(--text-secondary);margin-bottom:2px;}
  .mc-v{font-size:19px;font-weight:500;color:var(--text-primary);}
  .mc-s{font-size:10px;color:var(--text-tertiary);margin-top:1px;}
  .th-g{display:grid;grid-template-columns:26px 1fr 65px 65px 65px 90px 150px;gap:5px;padding:7px 11px;background:var(--bg-secondary);font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-radius:var(--radius-md) var(--radius-md) 0 0;}
  .fila{display:grid;grid-template-columns:26px 1fr 65px 65px 65px 90px 150px;gap:5px;padding:7px 11px;border-top:0.5px solid var(--border-light);align-items:center;font-size:12px;color:var(--text-primary);}
  .fila.top1{background:#EAF3DE;}
  .fila.bot1{background:#FCEBEB;}
  .pos{font-size:12px;font-weight:500;color:var(--text-secondary);text-align:center;}
  .pos.g{color:#B8860B;font-size:14px;}
  .pos.s{color:#888780;font-size:13px;}
  .pos.b{color:#8B5E3C;font-size:13px;}
  .num{text-align:center;font-variant-numeric:tabular-nums;}
  .bw{height:6px;background:var(--bg-secondary);border-radius:3px;margin-top:3px;}
  .bar{height:6px;border-radius:3px;}
  .bar.alta{background:#639922;}.bar.buena{background:#97C459;}
  .bar.media{background:#EF9F27;}.bar.baja{background:#E24B4A;}
  .pct{font-size:10px;font-weight:500;}
  .pct.alta,.pct.buena{color:#3B6D11;}
  .pct.media{color:#BA7517;}.pct.baja{color:#A32D2D;}
  .prod-lbl{font-size:11px;font-weight:500;white-space:nowrap;}
  .prod-lbl.alta,.prod-lbl.buena{color:#3B6D11;}
  .prod-lbl.media{color:#BA7517;}.prod-lbl.baja{color:#A32D2D;}
  .ing-g{display:grid;grid-template-columns:1fr 62px 62px 62px;gap:5px;align-items:center;margin-top:5px;}
  .ing-g input{width:100%;font-size:12px;padding:4px 5px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);text-align:center;}
  .ing-g input.err{border-color:#E24B4A;background:#FFF5F5;}
  .err-msg{font-size:11px;color:#A32D2D;margin-top:6px;padding:6px 10px;background:#FCEBEB;border-radius:var(--radius-md);display:none;}
  .err-msg.visible{display:block;}
  .row-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;}
  .cfg-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem;font-size:12px;color:var(--text-secondary);}
  .cfg-row input[type=number]{width:52px;font-size:12px;padding:4px 5px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);}
  .nom-g{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
  .nom-g input{font-size:12px;padding:5px 7px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);}
  .hist-h{display:grid;grid-template-columns:90px 80px 1fr 75px 75px 65px;gap:5px;padding:6px 11px;background:var(--bg-secondary);font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-radius:var(--radius-md) var(--radius-md) 0 0;}
  .hist-f{display:grid;grid-template-columns:90px 80px 1fr 75px 75px 65px;gap:5px;padding:6px 11px;border-top:0.5px solid var(--border-light);font-size:12px;color:var(--text-primary);align-items:center;}
  .login-sec{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;}
  .lbl{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
  .proj-resumen{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1rem;}
  .prc{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:10px 13px;cursor:pointer;}
  .prc:hover{background:var(--bg-secondary);}
  .prc-n{font-size:12px;font-weight:500;color:var(--text-primary);margin-bottom:4px;}
  .prc-m{font-size:11px;color:var(--text-secondary);}
  .leyenda-prod{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;margin-bottom:10px;}
  .hist-f{cursor:pointer;}
  .hist-f:hover{background:var(--bg-secondary);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
  .modal{background:var(--bg-primary);border-radius:var(--radius-lg);padding:1.5rem;max-width:680px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18);}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .modal-titulo{font-size:15px;font-weight:500;color:var(--text-primary);}
  .modal-close{font-size:18px;cursor:pointer;color:var(--text-secondary);background:none;border:none;padding:2px 8px;border-radius:var(--radius-md);}
  .modal-close:hover{background:var(--bg-secondary);}
  .modal-metricas{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1rem;}
  .det-h{display:grid;grid-template-columns:1fr 70px 70px 70px 85px 130px;gap:5px;padding:6px 10px;background:var(--bg-secondary);font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;border-radius:var(--radius-md) var(--radius-md) 0 0;}
  .det-f{display:grid;grid-template-columns:1fr 70px 70px 70px 85px 130px;gap:5px;padding:6px 10px;border-top:0.5px solid var(--border-light);font-size:12px;color:var(--text-primary);align-items:center;}
  .det-f.top1{background:#EAF3DE;}.det-f.bot1{background:#FCEBEB;}
  @media(max-width:600px){
    .th-g,.fila{grid-template-columns:22px 1fr 50px 50px 50px 65px 105px;font-size:11px;}
    .hist-h,.hist-f{grid-template-columns:75px 70px 1fr 60px 60px 55px;}
  }
</style>
</head>
<body>
<div class="container"><div id="appRoot"></div></div>
<script>
// ── Firebase config ──
var db = null; // will be set after firebase loads

const PASS='Cnc2026j';

function proyectosDefault(){
  return[
    {id:'p1',nombre:'Proyecto 1',meta:20,encuestadores:[{n:'Encuestador 1',c:0,i:0,r:0},{n:'Encuestador 2',c:0,i:0,r:0},{n:'Encuestador 3',c:0,i:0,r:0}]},
    {id:'p2',nombre:'Proyecto 2',meta:15,encuestadores:[{n:'Encuestador 1',c:0,i:0,r:0},{n:'Encuestador 4',c:0,i:0,r:0}]},
    {id:'p3',nombre:'Proyecto 3',meta:25,encuestadores:[{n:'Encuestador 2',c:0,i:0,r:0},{n:'Encuestador 5',c:0,i:0,r:0},{n:'Encuestador 6',c:0,i:0,r:0}]}
  ];
}

let esAdmin = sessionStorage.getItem('mpt_admin')==='ok';
let proyectos = proyectosDefault();
let historial = [];
let proyActivo=0, navActivo='tablero', charts={};

// ── Firebase helpers ──
function mostrarSync(tipo, msg){
  var el = document.getElementById('syncBar');
  if(!el) return;
  el.className = 'sync-bar ' + tipo;
  el.textContent = msg;
}

function initFirebase(){
  window._fbReady = true;
  fbCargar().then(function(){ renderProyecto(); });
}

var FB_URL = 'https://tablero-cnc-default-rtdb.firebaseio.com/tablero.json';

function fbGuardar(datos){
  mostrarSync('loading','Guardando en la nube...');
  return fetch(FB_URL, {
    method: 'PUT',
    mode: 'cors',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(datos)
  }).then(function(r){
    if(r.ok){ mostrarSync('ok','✓ Guardado y visible para todos'); }
    else { mostrarSync('err','Error al guardar ('+r.status+').'); }
  }).catch(function(e){ console.error('Guardar error:',e); mostrarSync('err','Error de red al guardar.'); });
}

function fbCargar(){
  mostrarSync('loading','Cargando datos...');
  return fetch(FB_URL, {mode:'cors'})
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.proyectos) proyectos = data.proyectos;
      if(data && data.historial) historial = data.historial;
      mostrarSync('ok','✓ Datos actualizados');
      setTimeout(function(){ var s=document.getElementById('syncBar'); if(s) s.style.display='none'; }, 3000);
    }).catch(function(e){ console.error('Cargar error:',e); mostrarSync('err','No se pudieron cargar los datos.'); });
}

function prod(pct){
  if(pct<=60)return{clase:'baja',label:'Productividad baja'};
  if(pct<=90)return{clase:'media',label:'Productividad media'};
  if(pct<=99)return{clase:'buena',label:'Productividad buena'};
  return{clase:'alta',label:'Productividad alta'};
}
function chartHex(pct){if(pct<=60)return'#E24B4A';if(pct<=90)return'#EF9F27';if(pct<=99)return'#97C459';return'#639922';}

function render(){
  document.getElementById('appRoot').innerHTML=esAdmin?htmlAdmin():htmlVisor();
  setTimeout(function(){ bindCommon(); renderProyecto(); },30);
}

function htmlTopbar(){
  const fecha=new Date().toLocaleDateString('es-CO',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
  return`<div class="topbar"><span class="ttl">Tablero de productividad</span>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    ${esAdmin
      ?`<span class="rol-badge admin">Administrador</span><span style="font-size:11px;color:var(--text-secondary);">${fecha}</span><button class="btn" id="btnLogout">Cerrar sesion</button>`
      :`<span class="rol-badge viewer">Solo lectura</span><button class="btn" id="btnLoginShow">Acceso admin</button>`}
  </div></div>
  <div id="syncBar" class="sync-bar"></div>`;
}
function htmlProjTabs(){
  return`<div class="proj-tabs">${proyectos.map((p,i)=>`<button class="proj-tab${i===proyActivo?' activo':''}" onclick="cambiarProyecto(${i})">${p.nombre}</button>`).join('')}
  ${esAdmin?`<button class="proj-tab" onclick="nuevoProyecto()" style="color:#639922;">+ Nuevo</button>`:''}</div>`;
}
function htmlVisor(){
  return`${htmlTopbar()}
  <div id="loginPanel" style="display:none;" class="login-sec">
    <div class="sec-t">Acceso administrador</div>
    <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;">
      <input type="password" id="loginPass" placeholder="Contraseña" style="font-size:12px;padding:5px 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);width:170px;">
      <button class="btn prim" id="btnLoginSubmit">Entrar</button>
    </div>
    <div style="font-size:11px;color:#A32D2D;min-height:14px;margin-top:4px;" id="loginError"></div>
  </div>
  ${htmlProjTabs()}<div id="proyContenido"></div>`;
}
function htmlAdmin(){
  return`${htmlTopbar()}${htmlProjTabs()}
  <div class="nav-tabs">
    <button class="nav-tab${navActivo==='tablero'?' activo':''}" onclick="setNav('tablero',this)">Tablero</button>
    <button class="nav-tab${navActivo==='equipo'?' activo':''}" onclick="setNav('equipo',this)">Equipo</button>
    <button class="nav-tab${navActivo==='proyecto'?' activo':''}" onclick="setNav('proyecto',this)">Proyecto</button>
    <button class="nav-tab${navActivo==='historial'?' activo':''}" onclick="setNav('historial',this)">Historial</button>
    <button class="nav-tab${navActivo==='resumen'?' activo':''}" onclick="setNav('resumen',this)">Vision general</button>
  </div>
  <div id="proyContenido"></div>`;
}
function bindCommon(){
  const ls2=document.getElementById('btnLoginShow');
  if(ls2)ls2.onclick=()=>{document.getElementById('loginPanel').style.display='block';ls2.style.display='none';};
  const sub=document.getElementById('btnLoginSubmit');
  if(sub)sub.onclick=intentarLogin;
  const lp=document.getElementById('loginPass');
  if(lp)lp.addEventListener('keydown',e=>{if(e.key==='Enter')intentarLogin();});
  const lo=document.getElementById('btnLogout');
  if(lo)lo.onclick=()=>{esAdmin=false;sessionStorage.removeItem('mpt_admin');render();};
}
function intentarLogin(){
  const v=document.getElementById('loginPass').value;
  if(v===PASS){esAdmin=true;sessionStorage.setItem('mpt_admin','ok');render();}
  else{document.getElementById('loginError').textContent='Contraseña incorrecta.';document.getElementById('loginPass').value='';}
}
function cambiarProyecto(i){
  proyActivo=i;
  document.querySelectorAll('.proj-tab').forEach((b,idx)=>b.classList.toggle('activo',idx===i));
  renderProyecto();
}
function setNav(nav,btn){
  navActivo=nav;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('activo'));
  if(btn)btn.classList.add('activo');
  renderProyecto();
}
function renderProyecto(){
  const cont=document.getElementById('proyContenido');if(!cont)return;
  if(!esAdmin){cont.innerHTML=htmlTableroView();setTimeout(()=>{renderRanking();renderResumen();renderChart();},20);return;}
  if(navActivo==='tablero'){cont.innerHTML=htmlTableroAdmin();setTimeout(()=>{renderIngreso();renderRanking();renderResumen();renderChart();bindIngreso();},20);}
  else if(navActivo==='equipo'){cont.innerHTML=htmlEquipo();setTimeout(()=>renderNombresGrid(),20);}
  else if(navActivo==='proyecto'){cont.innerHTML=htmlConfigProyecto();}
  else if(navActivo==='historial'){cont.innerHTML=htmlHistorial();}
  else if(navActivo==='resumen'){cont.innerHTML=htmlResumenGeneral();setTimeout(renderChartGeneral,20);}
}
function p(){return proyectos[proyActivo];}
function htmlLeyenda(){
  return`<div class="leyenda-prod">
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:9px;height:9px;border-radius:2px;background:#E24B4A;display:inline-block;"></span><span style="color:#A32D2D;">0–60% Baja</span></span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:9px;height:9px;border-radius:2px;background:#EF9F27;display:inline-block;"></span><span style="color:#BA7517;">61–90% Media</span></span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:9px;height:9px;border-radius:2px;background:#97C459;display:inline-block;"></span><span style="color:#3B6D11;">91–99% Buena</span></span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:9px;height:9px;border-radius:2px;background:#639922;display:inline-block;"></span><span style="color:#3B6D11;">100%+ Alta</span></span>
  </div>`;
}
function htmlRankingWrap(){
  return`<div class="sec"><div class="sec-t">Ranking — ${p().nombre}</div>${htmlLeyenda()}
  <div class="th-g"><div>#</div><div>Encuestador</div><div class="num">Efectivas</div><div class="num">Llamadas</div><div class="num">Rechazos</div><div class="num">% Meta</div><div class="num">Estado</div></div>
  <div id="ranking"></div></div>`;
}
function htmlChartWrap(){
  return`<div class="sec"><div class="sec-t">Efectivas por encuestador — ${p().nombre}</div>
  <div style="position:relative;width:100%;" id="chartWrap"><canvas id="barChart"></canvas></div></div>`;
}
function htmlTableroView(){return`<div class="metricas" id="resumen"></div>${htmlRankingWrap()}${htmlChartWrap()}`;}
function htmlTableroAdmin(){
  return`<div class="cfg-row"><span>Meta diaria:</span>
  <input type="number" id="metaDiaria" value="${p().meta}" min="1" max="999" step="1" onchange="actualizarMeta()">
  <span>encuestas</span></div>
  <div class="metricas" id="resumen"></div>
  <div class="sec"><div class="sec-t">Registro de avance — ${p().nombre}</div>
  <div class="ing-g" style="margin-top:0;">
    <div style="font-size:11px;color:var(--text-secondary);">Encuestador</div>
    <div style="font-size:11px;color:var(--text-secondary);text-align:center;">Efectivas</div>
    <div style="font-size:11px;color:var(--text-secondary);text-align:center;">Llamadas</div>
    <div style="font-size:11px;color:var(--text-secondary);text-align:center;">Rechazos</div>
  </div>
  <div id="ingresoFilas"></div>
  <div id="errValidacion" class="err-msg"></div>
  <div class="row-btns">
    <button class="btn prim" onclick="recalcular()">Actualizar tablero</button>
    <button class="btn" onclick="guardarDia()">Guardar dia</button>
  </div></div>
  ${htmlRankingWrap()}${htmlChartWrap()}`;
}
function htmlEquipo(){
  return`<div class="sec"><div class="sec-t">Encuestadores — ${p().nombre}</div>
  <p style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;">Edita los nombres del equipo asignado a este proyecto.</p>
  <div class="nom-g" id="nombresGrid"></div>
  <div class="row-btns">
    <button class="btn prim" onclick="guardarNombres()">Guardar nombres</button>
    <button class="btn" onclick="agregarEnc()">+ Agregar</button>
    <button class="btn danger" onclick="eliminarUltimo()">- Eliminar ultimo</button>
  </div>
  <p style="font-size:11px;color:var(--text-tertiary);margin-top:7px;" id="nomMsg"></p></div>`;
}
function htmlConfigProyecto(){
  const pr=p();
  return`<div class="sec"><div class="sec-t">Configuracion del proyecto</div>
  <div style="display:flex;flex-direction:column;gap:10px;max-width:320px;">
    <div><div class="lbl">Nombre del proyecto</div>
    <input type="text" id="projNombre" value="${pr.nombre}" style="width:100%;font-size:13px;padding:6px 9px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);"></div>
    <div><div class="lbl">Meta diaria</div>
    <input type="number" id="projMeta" value="${pr.meta}" min="1" max="999" style="width:100%;font-size:13px;padding:6px 9px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);"></div>
  </div>
  <div class="row-btns" style="margin-top:12px;">
    <button class="btn prim" onclick="guardarConfigProyecto()">Guardar cambios</button>
    ${proyectos.length>1?`<button class="btn danger" onclick="eliminarProyecto()">Eliminar proyecto</button>`:''}
  </div>
  <p style="font-size:11px;color:var(--text-tertiary);margin-top:7px;" id="projMsg"></p></div>`;
}
function htmlHistorial(){
  var pId=p().id;var ph=historial.filter(function(h){return h.pId===pId;});
  var filas='';
  ph.forEach(function(h,idx){
    var pct=Math.round((h.total/(h.meta*h.tEnc))*100);var cl=prod(pct).clase;
    filas+='<div class="hist-f" onclick="abrirDetalle('+idx+')" title="Ver detalle del dia">';
    filas+='<div style="color:#3B6D11;font-weight:500;text-decoration:underline;cursor:pointer;">'+h.fecha+'</div>';
    filas+='<div style="font-size:11px;color:var(--text-secondary);">'+h.projNombre+'</div>';
    filas+='<div><div class="bw" style="max-width:120px;"><div class="bar '+cl+'" style="width:'+Math.min(100,pct)+'%"></div></div></div>';
    filas+='<div class="num">'+h.total+'</div><div class="num">'+h.enMeta+'/'+h.tEnc+'</div>';
    filas+='<div class="num"><span class="pct '+cl+'">'+pct+'%</span></div></div>';
  });
  return '<div class="sec"><div class="sec-t">Historial — '+p().nombre+'</div>'
    +(!ph.length?'<p style="font-size:12px;color:var(--text-secondary);">Aun no hay dias guardados. Recuerda usar "Guardar dia" al final de cada jornada.</p>'
    :'<div class="hist-h"><div>Fecha</div><div>Proyecto</div><div>Progreso</div><div class="num">Efectivas</div><div class="num">En meta</div><div class="num">% avance</div></div>'+filas)
    +'<div class="row-btns" style="margin-top:10px;"><button class="btn danger" onclick="limpiarHistProyecto()">Limpiar historial de este proyecto</button></div></div>'
    +'<div id="modalOverlay" class="modal-overlay" style="display:none;" onclick="cerrarModal(event)"><div class="modal" id="modalContenido"></div></div>';
}

function abrirDetalle(idx){
  var pId=p().id;
  var ph=historial.filter(function(h){return h.pId===pId;});
  var h=ph[idx];if(!h)return;
  var pct=Math.round((h.total/(h.meta*h.tEnc))*100);
  var cl=prod(pct).clase;
  var html='<div class="modal-header">'
    +'<span class="modal-titulo">Resumen del '+h.fecha+' — '+h.projNombre+'</span>'
    +'<button class="modal-close" onclick="document.getElementById(&quot;modalOverlay&quot;).style.display=&quot;none&quot;">&#x2715;</button>'
    +'</div>';
  html+='<div class="modal-metricas">';
  html+='<div class="mc"><div class="mc-l">Total efectivas</div><div class="mc-v">'+h.total+'</div><div class="mc-s">meta: '+(h.meta*h.tEnc)+'</div></div>';
  html+='<div class="mc"><div class="mc-l">Avance</div><div class="mc-v"><span class="pct '+cl+'">'+pct+'%</span></div><div class="mc-s">'+prod(pct).label+'</div></div>';
  html+='<div class="mc"><div class="mc-l">En meta</div><div class="mc-v">'+h.enMeta+'</div><div class="mc-s">de '+h.tEnc+' enc.</div></div>';
  html+='<div class="mc"><div class="mc-l">Meta del dia</div><div class="mc-v">'+h.meta+'</div><div class="mc-s">por encuestador</div></div>';
  html+='</div>';
  if(h.detalle && h.detalle.length){
    var sorted=h.detalle.slice().sort(function(a,b){return b.c-a.c;});
    html+='<div class="det-h"><div>Encuestador</div><div class="num">Efectivas</div><div class="num">Llamadas</div><div class="num">Rechazos</div><div class="num">% Meta</div><div class="num">Estado</div></div>';
    sorted.forEach(function(e,i){
      var ep=Math.round((e.c/Math.max(h.meta,1))*100);var ecl=prod(ep).clase;
      var isTop=i===0;var isBot=i===sorted.length-1&&sorted.length>1;
      html+='<div class="det-f'+(isTop?' top1':isBot?' bot1':'')+'">';
      html+='<div style="font-weight:500;">'+e.n+'</div>';
      html+='<div class="num">'+e.c+'</div><div class="num">'+e.i+'</div><div class="num">'+e.r+'</div>';
      html+='<div><div style="display:flex;align-items:center;gap:4px;"><div style="flex:1;"><div class="bw"><div class="bar '+ecl+'" style="width:'+Math.min(100,ep)+'%"></div></div></div><span class="pct '+ecl+'">'+ep+'%</span></div></div>';
      html+='<div class="num"><span class="prod-lbl '+ecl+'">'+prod(ep).label+'</span></div></div>';
    });
  } else {
    html+='<p style="font-size:12px;color:var(--text-secondary);margin-top:8px;">Este dia fue guardado sin detalle por encuestador.<br>Los dias guardados a partir de ahora incluirán el detalle completo.</p>';
  }
  document.getElementById('modalContenido').innerHTML=html;
  document.getElementById('modalOverlay').style.display='flex';
}

function cerrarModal(e){
  if(e.target.id==='modalOverlay') document.getElementById('modalOverlay').style.display='none';
}
function htmlResumenGeneral(){
  return`<div class="sec"><div class="sec-t">Vision general — todos los proyectos</div>
  <div class="proj-resumen" id="projResumen"></div></div>
  <div class="sec"><div class="sec-t">Efectivas por proyecto</div>
  <div style="position:relative;width:100%;height:220px;"><canvas id="chartGeneral"></canvas></div></div>`;
}
function renderChartGeneral(){
  const c=document.getElementById('chartGeneral');if(!c)return;
  if(charts['general']){charts['general'].destroy();delete charts['general'];}
  const labels=proyectos.map(p=>p.nombre);
  const completadas=proyectos.map(p=>p.encuestadores.reduce((s,e)=>s+e.c,0));
  const metas=proyectos.map(p=>p.meta*p.encuestadores.length);
  const pcts=proyectos.map((p,i)=>metas[i]>0?Math.round((completadas[i]/metas[i])*100):0);
  const pr=document.getElementById('projResumen');
  if(pr)pr.innerHTML=proyectos.map((proj,i)=>{
    const cl=prod(pcts[i]).clase;
    return`<div class="prc" onclick="cambiarProyecto(${i});setNav('tablero',null)">
    <div class="prc-n">${proj.nombre}</div>
    <div style="font-size:18px;font-weight:500;color:var(--text-primary);margin:2px 0;">${completadas[i]}</div>
    <div class="prc-m">meta: ${metas[i]}</div>
    <div style="margin-top:5px;"><div class="bw"><div class="bar ${cl}" style="width:${Math.min(100,pcts[i])}%"></div></div></div>
    <div style="font-size:10px;margin-top:3px;" class="pct ${cl}">${pcts[i]}%</div></div>`;}).join('');
  charts['general']=new Chart(c,{type:'bar',data:{labels,datasets:[{label:'Efectivas',data:completadas,backgroundColor:pcts.map(chartHex),borderRadius:3,barPercentage:0.55}]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11}},grid:{display:false}},y:{ticks:{font:{size:11}},grid:{color:'rgba(0,0,0,0.06)'}}}}});
}
function posIcon(i){
  if(i===0)return'<span class="pos g">&#9733;</span>';
  if(i===1)return'<span class="pos s">2</span>';
  if(i===2)return'<span class="pos b">3</span>';
  return`<span class="pos">${i+1}</span>`;
}
function bindIngreso(){
  p().encuestadores.forEach((_,i)=>{
    ['c','t','r'].forEach(pfx=>{
      const el=document.getElementById(`${pfx}_${i}`);
      if(el)el.addEventListener('input',()=>validarFila(i));
    });
  });
}
function validarFila(i){
  const c=parseInt(document.getElementById(`c_${i}`)?.value)||0;
  const t=parseInt(document.getElementById(`t_${i}`)?.value)||0;
  const r=parseInt(document.getElementById(`r_${i}`)?.value)||0;
  const nombre=p().encuestadores[i]?.n||`Encuestador ${i+1}`;
  const errores=[];
  const elC=document.getElementById(`c_${i}`);const elR=document.getElementById(`r_${i}`);
  if(elC)elC.classList.toggle('err',t>0&&c>t);
  if(elR)elR.classList.toggle('err',t>0&&r>t);
  if(t>0&&c>t)errores.push(`${nombre}: las efectivas (${c}) no pueden ser más que las llamadas (${t}).`);
  if(t>0&&r>t)errores.push(`${nombre}: los rechazos (${r}) no pueden ser más que las llamadas (${t}).`);
  if(t>0&&(c+r)>t)errores.push(`${nombre}: efectivas (${c}) + rechazos (${r}) supera las llamadas (${t}).`);
  mostrarError(errores);
}
function validarTodo(){
  const pr=p();const errores=[];
  pr.encuestadores.forEach((e,i)=>{
    const c=parseInt(document.getElementById(`c_${i}`)?.value)||0;
    const t=parseInt(document.getElementById(`t_${i}`)?.value)||0;
    const r=parseInt(document.getElementById(`r_${i}`)?.value)||0;
    const elC=document.getElementById(`c_${i}`);const elR=document.getElementById(`r_${i}`);
    if(elC)elC.classList.toggle('err',t>0&&c>t);
    if(elR)elR.classList.toggle('err',t>0&&r>t);
    if(t>0&&c>t)errores.push(`${e.n}: efectivas (${c}) > llamadas (${t}).`);
    if(t>0&&r>t)errores.push(`${e.n}: rechazos (${r}) > llamadas (${t}).`);
    if(t>0&&(c+r)>t)errores.push(`${e.n}: efectivas+rechazos (${c+r}) > llamadas (${t}).`);
  });
  mostrarError(errores);return errores.length===0;
}
function mostrarError(errores){
  var el=document.getElementById('errValidacion');if(!el)return;
  if(errores.length===0){el.classList.remove('visible');el.innerHTML='';}
  else{el.classList.add('visible');el.innerHTML='<strong>Error en el registro:</strong><br>'+errores.map(function(e){return '• '+e;}).join('<br>');}
}
function actualizarMeta(){
  const v=parseInt(document.getElementById('metaDiaria')?.value)||20;
  proyectos[proyActivo].meta=v;
  renderRanking();renderResumen();renderChart();
}
function renderIngreso(){
  const cont=document.getElementById('ingresoFilas');if(!cont)return;
  cont.innerHTML=p().encuestadores.map((e,i)=>`
  <div class="ing-g">
    <div style="font-size:12px;color:var(--text-primary);">${e.n}</div>
    <input type="number" min="0" max="999" value="${e.c}" id="c_${i}" step="1">
    <input type="number" min="0" max="999" value="${e.i}" id="t_${i}" step="1">
    <input type="number" min="0" max="999" value="${e.r}" id="r_${i}" step="1">
  </div>`).join('');
}
function recalcular(){
  if(!validarTodo())return;
  const metaEl=document.getElementById('metaDiaria');
  if(metaEl)proyectos[proyActivo].meta=parseInt(metaEl.value)||20;
  proyectos[proyActivo].encuestadores=p().encuestadores.map((e,i)=>({
    n:e.n,
    c:parseInt(document.getElementById(`c_${i}`)?.value)||0,
    i:parseInt(document.getElementById(`t_${i}`)?.value)||0,
    r:parseInt(document.getElementById(`r_${i}`)?.value)||0
  }));
  fbGuardar({proyectos,historial});
  renderRanking();renderResumen();renderChart();
}
function renderRanking(){
  const cont=document.getElementById('ranking');if(!cont)return;
  const pr=p();const sorted=[...pr.encuestadores].sort((a,b)=>b.c-a.c);
  cont.innerHTML=sorted.map((e,i)=>{
    const pct=Math.round((e.c/Math.max(pr.meta,1))*100);
    const pctBar=Math.min(100,pct);const cl=prod(pct).clase;
    const isTop=i===0;const isBot=i===sorted.length-1&&sorted.length>1;
    return`<div class="fila${isTop?' top1':isBot?' bot1':''}">
    <div>${posIcon(i)}</div>
    <div style="font-weight:500;font-size:12px;">${e.n}</div>
    <div class="num">${e.c}</div><div class="num">${e.i}</div><div class="num">${e.r}</div>
    <div><div style="display:flex;align-items:center;gap:4px;">
      <div style="flex:1;"><div class="bw"><div class="bar ${cl}" style="width:${pctBar}%"></div></div></div>
      <span class="pct ${cl}">${pct}%</span></div></div>
    <div class="num"><span class="prod-lbl ${cl}">${prod(pct).label}</span></div>
    </div>`;}).join('');
}
function renderResumen(){
  const cont=document.getElementById('resumen');if(!cont)return;
  const pr=p();
  const total=pr.encuestadores.reduce((s,e)=>s+e.c,0);
  const totalMeta=pr.meta*pr.encuestadores.length;
  const pctG=Math.round((total/Math.max(totalMeta,1))*100);
  const enMeta=pr.encuestadores.filter(e=>e.c>=pr.meta).length;
  const totalInt=pr.encuestadores.reduce((s,e)=>s+e.i,0);
  const tasa=totalInt>0?Math.round((total/totalInt)*100):0;
  const sorted=[...pr.encuestadores].sort((a,b)=>b.c-a.c);
  const mejor=sorted[0];const rezagado=sorted.length>1?sorted[sorted.length-1]:null;
  const clG=prod(pctG).clase;
  cont.innerHTML=`
  <div class="mc"><div class="mc-l">Total efectivas</div><div class="mc-v">${total}</div><div class="mc-s">meta: ${totalMeta}</div></div>
  <div class="mc"><div class="mc-l">Avance global</div><div class="mc-v"><span class="pct ${clG}" style="font-size:19px;">${pctG}%</span></div><div class="mc-s">${prod(pctG).label}</div></div>
  <div class="mc"><div class="mc-l">En meta</div><div class="mc-v">${enMeta}</div><div class="mc-s">de ${pr.encuestadores.length}</div></div>
  <div class="mc"><div class="mc-l">Tasa contacto</div><div class="mc-v">${tasa}%</div><div class="mc-s">efectivas/llamadas</div></div>
  <div class="mc"><div class="mc-l">Lider</div><div class="mc-v" style="font-size:13px;color:#3B6D11;">${mejor.n.split(' ')[0]}</div><div class="mc-s">${mejor.c} efectivas</div></div>
  ${rezagado?`<div class="mc"><div class="mc-l">Rezagado</div><div class="mc-v" style="font-size:13px;color:#A32D2D;">${rezagado.n.split(' ')[0]}</div><div class="mc-s">${rezagado.c} efectivas</div></div>`:''}`;
}
function renderChart(){
  const wrap=document.getElementById('chartWrap');const canvas=document.getElementById('barChart');
  if(!wrap||!canvas)return;
  const pr=p();const sorted=[...pr.encuestadores].sort((a,b)=>b.c-a.c);
  const h=Math.max(200,sorted.length*38+60);wrap.style.height=h+'px';
  const cid='chart_'+proyActivo;
  if(charts[cid]){charts[cid].destroy();delete charts[cid];}
  const pcts=sorted.map(e=>Math.round((e.c/Math.max(pr.meta,1))*100));
  charts[cid]=new Chart(canvas,{type:'bar',
    data:{labels:sorted.map(e=>e.n.split(' ').slice(0,2).join(' ')),
    datasets:[{label:'Efectivas',data:sorted.map(e=>e.c),backgroundColor:pcts.map(chartHex),borderRadius:4,barPercentage:0.6}]},
    options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`Efectivas: ${ctx.parsed.y}`}}},
    scales:{x:{ticks:{font:{size:10},autoSkip:false,maxRotation:35},grid:{display:false}},
    y:{ticks:{font:{size:10},stepSize:1},grid:{color:'rgba(0,0,0,0.05)'}}}}});
}
function renderNombresGrid(){
  const cont=document.getElementById('nombresGrid');if(!cont)return;
  cont.innerHTML=p().encuestadores.map((e,i)=>`<input type="text" value="${e.n}" id="nm_${i}" placeholder="Nombre ${i+1}">`).join('');
}
function guardarNombres(){
  const inputs=document.querySelectorAll('#nombresGrid input');
  proyectos[proyActivo].encuestadores=Array.from(inputs).map((inp,i)=>({n:inp.value.trim()||`Encuestador ${i+1}`,c:p().encuestadores[i]?.c||0,i:p().encuestadores[i]?.i||0,r:p().encuestadores[i]?.r||0}));
  fbGuardar({proyectos,historial});
  const msg=document.getElementById('nomMsg');
  if(msg){msg.textContent='Nombres guardados.';setTimeout(()=>msg.textContent='',2500);}
}
function agregarEnc(){
  proyectos[proyActivo].encuestadores.push({n:`Encuestador ${p().encuestadores.length+1}`,c:0,i:0,r:0});
  renderNombresGrid();
}
function eliminarUltimo(){
  if(p().encuestadores.length<=1)return;
  proyectos[proyActivo].encuestadores.pop();renderNombresGrid();
}
function guardarConfigProyecto(){
  const nombre=document.getElementById('projNombre').value.trim();
  const meta=parseInt(document.getElementById('projMeta').value)||20;
  if(!nombre)return;
  proyectos[proyActivo].nombre=nombre;proyectos[proyActivo].meta=meta;
  fbGuardar({proyectos,historial}).then(()=>render());
}
function eliminarProyecto(){
  if(!confirm(`¿Eliminar "${p().nombre}"?`))return;
  proyectos.splice(proyActivo,1);proyActivo=Math.max(0,proyActivo-1);
  fbGuardar({proyectos,historial}).then(()=>render());
}
function nuevoProyecto(){
  proyectos.push({id:'p'+Date.now(),nombre:`Proyecto ${proyectos.length+1}`,meta:20,encuestadores:[{n:'Encuestador 1',c:0,i:0,r:0}]});
  proyActivo=proyectos.length-1;navActivo='proyecto';
  fbGuardar({proyectos,historial}).then(()=>render());
}
function guardarDia(){
  if(!validarTodo())return;
  const pr=p();
  const hoy=new Date().toLocaleDateString('es-CO',{year:'numeric',month:'2-digit',day:'2-digit'});
  historial.unshift({pId:pr.id,projNombre:pr.nombre,fecha:hoy,meta:pr.meta,total:pr.encuestadores.reduce((s,e)=>s+e.c,0),enMeta:pr.encuestadores.filter(e=>e.c>=pr.meta).length,tEnc:pr.encuestadores.length,detalle:pr.encuestadores.map(function(e){return{n:e.n,c:e.c,i:e.i,r:e.r};})});
  if(historial.length>120)historial=historial.slice(0,120);
  fbGuardar({proyectos,historial});
  alert(`Dia guardado para "${pr.nombre}".`);
}
function limpiarHistProyecto(){
  if(!confirm('¿Limpiar historial de este proyecto?'))return;
  historial=historial.filter(h=>h.pId!==p().id);
  fbGuardar({proyectos,historial}).then(()=>renderProyecto());
}
initFirebase();
render();
</script>

</body>
</html>
